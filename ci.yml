# CI/CD Pipeline for the PV Dashboard project.
#
# Runs on every pull-request targeting main and on every push to main.
# Steps:
#   1. Lint with ruff
#   2. Format-check with black
#   3. Run pytest
#   4. Build the Docker image (validates the Dockerfile)
#
# The real API key is NEVER needed here; the tests use the mock source.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint, format & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests with pytest
        run: pytest --tb=short -v

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pv-dashboard:ci .
