# PV Dashboard – two services share one named volume for the SQLite database.
#
#   collector   runs src/main.py  → writes readings to /app/data/pv.db
#   dashboard   runs app.py       → reads from  /app/data/pv.db
#
# The API key must be supplied via a .env file (see README) and is NEVER
# committed to version control.

services:

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "src.main"]
    volumes:
      - pv_data:/app/data
    environment:
      # The real API URL and key are injected at runtime from a .env file.
      # Example .env contents (DO NOT COMMIT):

      - PV_API_URL=${PV_API_URL:-}
      - PV_API_KEY=${PV_API_KEY:-}
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    volumes:
      - pv_data:/app/data
    ports:
      - "8501:8501"
    depends_on:
      - collector
    restart: unless-stopped

volumes:
  pv_data:
    driver: local